name: ayureva_mobile
description: "Ayureva - Learn Ayurveda with Dr. Arti Singh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.3.0
  
  # Network & API
  http: ^1.2.2
  dio: ^5.9.1
  
  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.6.0
  
  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Video Player
  video_player: ^2.9.2
  chewie: ^1.8.5
  # Note: Using WebView for Jitsi live classes to avoid dependency conflicts
  
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.0
  
  # Animations
  animate_do: ^3.3.4
  webview_flutter: ^4.13.1
  path_provider: ^2.1.5
  razorpay_flutter: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - .env
